<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Music</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

```
body {
  font-family: Georgia, serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 20px;
}

h1 {
  font-size: 3.2rem;
  margin-bottom: 10px;
  color: #f0c060;
  text-shadow: 0 2px 8px rgba(0,0,0,0.5);
}

.subtitle {
  font-size: 1.5rem;
  color: #ccc;
  margin-bottom: 34px;
}

.now-playing {
  background: #16213e;
  border: 3px solid #f0c060;
  border-radius: 20px;
  padding: 28px 32px;
  width: 100%;
  max-width: 720px;
  margin-bottom: 30px;
  text-align: center;
}

.now-playing-label {
  font-size: 1.2rem;
  color: #f0c060;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.now-playing-title {
  font-size: 2rem;
  font-weight: bold;
  margin-bottom: 22px;
  min-height: 2.4rem;
  color: #fff;
  line-height: 1.3;
}

audio {
  width: 100%;
  height: 70px;
  border-radius: 10px;
  outline: none;
}

.playlist {
  width: 100%;
  max-width: 720px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.song-btn {
  background: #16213e;
  border: 3px solid #333a5c;
  border-radius: 16px;
  padding: 22px 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 20px;
  transition: all 0.2s;
  text-align: left;
  color: #eee;
  font-family: Georgia, serif;
  font-size: 1.5rem;
  width: 100%;
  line-height: 1.3;
}

.song-btn:hover {
  background: #0f3460;
  border-color: #f0c060;
  transform: scale(1.01);
}

.song-btn.active {
  background: #0f3460;
  border-color: #f0c060;
  color: #f0c060;
}

.song-num {
  font-size: 1.4rem;
  color: #aaa;
  min-width: 38px;
  text-align: center;
  font-weight: bold;
}

.song-btn.active .song-num {
  color: #f0c060;
}

.note-icon {
  font-size: 1.8rem;
}

.song-name {
  flex: 1;
}
```

  </style>
</head>
<body>

  <h1>🎵 My Music</h1>
  <p class="subtitle">Tap any song to play it</p>

  <div class="now-playing">
    <div class="now-playing-label">▶ Now Playing</div>
    <div class="now-playing-title" id="now-playing-title">— Select a song —</div>
    <audio id="player" controls></audio>
  </div>

  <div class="playlist" id="playlist"></div>

  <script>
    const songs = [
      { file: "01 - Dolly Parton - Eagle When She Flies.mp3", name: "Eagle When She Flies — Dolly Parton" },
      { file: "02 - Lonestar - I'm Already There.mp3", name: "I'm Already There — Lonestar" },
      { file: "03 - Steve Wariner - Holes in the Floor of Heaven.mp3", name: "Holes in the Floor of Heaven — Steve Wariner" },
      { file: "04 - Vince Gill - Go Rest High On That Mountain.mp3", name: "Go Rest High On That Mountain — Vince Gill" },
      { file: "05 - Willie Nelson - Always On My Mind.mp3", name: "Always On My Mind — Willie Nelson" },
      { file: "06 - The Oak Ridge Boys - Guess It Never Hurts To Hurt Sometimes.mp3", name: "Guess It Never Hurts To Hurt Sometimes — The Oak Ridge Boys" },
      { file: "07 - George Jones - A Picture Of Me Without You.mp3", name: "A Picture Of Me Without You — George Jones" },
      { file: "08 - Tanya Tucker - What Do I Do With Me.mp3", name: "What Do I Do With Me — Tanya Tucker" },
      { file: "09 - Hank Williams - I'm so Lonesome I Could Cry.mp3", name: "I'm So Lonesome I Could Cry — Hank Williams" },
      { file: "10 - Vince Gill - When I Call Your Name.mp3", name: "When I Call Your Name — Vince Gill" },
    ];

    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("now-playing-title");
    const playlist = document.getElementById("playlist");
    let currentIndex = -1;

    function playSong(i) {
      currentIndex = i;
      const song = songs[i];
      player.src = song.file;
      player.play();
      nowPlaying.textContent = song.name;
      document.querySelectorAll(".song-btn").forEach((btn, idx) => {
        btn.classList.toggle("active", idx === i);
      });
    }

    player.addEventListener("ended", () => {
      const next = (currentIndex + 1) % songs.length;
      playSong(next);
    });

    songs.forEach((song, i) => {
      const btn = document.createElement("button");
      btn.className = "song-btn";
      btn.innerHTML = `
        <span class="song-num">${i + 1}</span>
        <span class="note-icon">🎵</span>
        <span class="song-name">${song.name}</span>
      `;
      btn.onclick = () => playSong(i);
      playlist.appendChild(btn);
    });
  </script>

</body>
</html>
